<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .ico { fill: none; stroke: #1a1a1a; stroke-width: 28;
           stroke-linecap: round; stroke-linejoin: round; }
    .gem { stroke-width: 18; }
    @media (prefers-color-scheme: dark) { .ico { stroke: #f4f2ec; } }
  </style>
  <!-- two interlocking wedding bands -->
  <circle class="ico" cx="180" cy="330" r="140" />
  <circle class="ico" cx="350" cy="330" r="140" />
  <!-- solitaire diamond above the left band -->
  <g class="ico gem">
    <path d="M150 50 L210 50 L242 98 L180 178 L118 98 Z" />
    <path d="M118 98 L242 98" />
    <path d="M150 50 L180 178" />
    <path d="M210 50 L180 178" />
  </g>
</svg>
